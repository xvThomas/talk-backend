name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [talk-libs, talk, mcp-owm, mcp-playground, mcp-ign-nav]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: "${{ matrix.module }}/go.sum"

      - name: Download dependencies
        run: cd ${{ matrix.module }} && go mod download

      - name: Vet
        run: cd ${{ matrix.module }} && go vet ./...

      - name: Test
        run: cd ${{ matrix.module }} && go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: cd ${{ matrix.module }} && go tool cover -func=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.module }}
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: "**/go.sum"

      - name: golangci-lint talk-libs
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: talk-libs

      - name: golangci-lint talk
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: talk

      - name: golangci-lint mcp-owm
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: mcp-owm

      - name: golangci-lint mcp-playground
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: mcp-playground

      - name: golangci-lint mcp-ign-nav
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: mcp-ign-nav
