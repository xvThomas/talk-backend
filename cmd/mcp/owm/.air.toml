root = "../../.."
tmp_dir = "cmd/mcp/owm/tmp"

[build]
  cmd = "cd ../../.. && go build -o cmd/mcp/owm/tmp/main.exe ./cmd/mcp/owm"
  bin = "tmp/main.exe"
  args_bin = ["--transport", "http", "--addr", "localhost:8080"]
  delay = 1000
  include_dir = ["cmd/mcp/owm", "pkg/mcpserver", "internal/infrastructure/tools/openweather"]
  include_ext = ["go", "toml"]
  exclude_dir = ["tmp", "bin", "node_modules"]
  exclude_regex = ["_test\\.go"]
  kill_delay = 500

[log]
  time = false